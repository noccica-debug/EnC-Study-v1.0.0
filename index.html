<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnC Study v1.0.0</title>
    <style>
        /* 구글 Material 3 트렌드 컬러 및 시스템 폰트 */
        :root {
            --bg-color: #FFFFFF;
            --btn-gray: #F8F9FA;
            --text-main: #202124;
            --text-sub: #5F6368;
            --google-blue: #0B57D0;
            --border-light: #DADCE0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-float: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-modal: 0 8px 24px rgba(0, 0, 0, 0.15);
            --error-red: #D32F2F;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 768px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 헤더 (설정 아이콘 포함) */
        header {
            padding: 24px 16px 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            background-color: var(--bg-color);
            z-index: 10;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .settings-btn {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            color: var(--text-sub);
        }

        main {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.2s ease; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 공통 버튼 스타일 */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
        }

        button {
            width: auto;
            padding: 10px 24px;
            border: 1px solid transparent;
            border-radius: 24px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap; /* 모바일 기기 글자 세로 쪼개짐 방지 */
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-outline {
            background-color: var(--btn-gray);
            color: var(--text-main);
        }

        .btn-outline:active {
            background-color: #F1F3F4;
        }

        .btn-primary {
            background-color: var(--google-blue);
            color: #FFFFFF;
            padding: 12px 32px;
            font-weight: 600;
            display: block;
            margin: 24px auto 0;
        }

        .btn-primary:active { opacity: 0.8; }

        textarea, input[type="text"] {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border-light);
            border-radius: 16px;
            font-size: 1rem;
            resize: none;
            transition: all 0.2s;
        }
        
        textarea { height: 160px; box-shadow: var(--shadow-sm); }
        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--google-blue);
        }

        .input-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-sub);
            margin: 0 0 8px 4px;
            display: block;
            text-align: left;
        }

        .result-block {
            padding: 16px 8px;
            border-bottom: 1px solid var(--btn-gray);
        }
        
        .result-title {
            font-weight: 600;
            color: var(--google-blue);
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .result-content { font-size: 1.05rem; color: var(--text-main); }
        .word-list { list-style-type: none; }
        .word-list li { font-size: 1rem; margin-bottom: 4px; }
        
        .error-message {
            color: var(--error-red);
            font-weight: 600;
            text-align: center;
            padding: 16px;
            background-color: #FFEBEE;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        /* 하단 플로팅 탭 */
        footer {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 100px;
            box-shadow: var(--shadow-float);
            padding: 4px;
            border: 1px solid var(--border-light);
            z-index: 100;
        }

        .tab-btn {
            padding: 10px 28px;
            font-size: 0.9rem;
            color: var(--text-sub);
            background: transparent;
            margin: 0;
        }

        .tab-btn.active {
            color: var(--google-blue);
            font-weight: 600;
            background-color: var(--btn-gray);
            border-radius: 24px;
        }
        
        /* 이미지 미리보기 */
        #image-preview-container {
            display: none;
            text-align: center;
            margin-bottom: 16px;
        }
        
        #image-preview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
        }

        /* 관리자 설정 모달 */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--bg-color);
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--shadow-modal);
        }

        .modal-content h3 { margin-bottom: 20px; font-weight: 600; text-align: center; }
        .modal-content .input-group { margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
        .modal-actions button { flex: 1; margin: 0; padding: 12px; }
        .version-text { text-align: center; color: var(--text-sub); font-size: 0.8rem; margin-top: 16px; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="header-title">EnC Study</div>
        <button class="settings-btn" onclick="openSettings()">⚙️</button>
    </header>

    <main>
        <section id="view-input" class="view-section active">
            
            <div class="btn-group">
                <button class="btn-outline" onclick="triggerCamera(1)">[ 1차 스캔 ]</button>
                <button class="btn-outline" onclick="triggerCamera(2)">[ 2차 스캔 ]</button>
                <button class="btn-outline" onclick="document.getElementById('file-upload').click()">[ 사진 첨부 ]</button>
            </div>
            
            <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            
            <div id="image-preview-container">
                <span class="input-label">스캔된 이미지 (자동 압축됨)</span>
                <img id="image-preview" src="" alt="미리보기">
            </div>

            <span class="input-label" style="margin-top: 16px;">텍스트 입력</span>
            <textarea id="text-input" placeholder="직접 붙여넣으십시오..."></textarea>

            <button id="btn-analyze" class="btn-primary" onclick="analyzeData()">▶ 지문 분석 시작</button>
        </section>

        <section id="view-test" class="view-section">
            <span class="input-label">문장 구조 분석</span>
            
            <div class="result-block" style="border: none;">
                <div id="loading-status" class="result-content" style="background: var(--btn-gray); padding: 24px; border-radius: 24px; text-align: center; font-size: 0.95rem;">
                    대기 중...
                </div>
            </div>

            <button id="btn-submit" class="btn-primary" style="display: none;" onclick="submitAndSendLog()">정답 제출 및 채점</button>
            <button id="btn-retry-error" class="btn-outline" style="display: none; margin: 24px auto 0;" onclick="resetAndGoInput()">입력 화면으로 돌아가기</button>
        </section>

        <section id="view-result" class="view-section">
            <div style="font-weight: 600; font-size: 1.2rem; margin-bottom: 24px; color: var(--text-main); text-align: center;">
                논리 분석 <span style="color: var(--google-blue); font-size: 1.5rem; font-weight: 700;">완료</span>
            </div>

            <div class="result-block">
                <div class="result-title">■ 핵심 1줄 요약</div>
                <div id="res-main-idea" class="result-content"></div>
            </div>

            <div class="result-block">
                <div class="result-title">■ 정답 결정적 단서</div>
                <div id="res-trigger-word" class="result-content"></div>
            </div>

            <div class="result-block">
                <div class="result-title">■ 필수 뼈대 문장</div>
                <div id="res-core-syntax" class="result-content"></div>
            </div>

            <div class="result-block" style="border: none;">
                <div class="result-title">■ 지문 맞춤 필수 영단어</div>
                <ul id="res-vocabulary" class="word-list"></ul>
            </div>

            <button class="btn-outline" style="display: block; margin: 32px auto 0;" onclick="resetAndGoInput()">🔄 다시 풀기</button>
        </section>
    </main>

    <footer>
        <button id="tab-input" class="tab-btn active" onclick="switchView('input')">스캔</button>
        <button id="tab-test" class="tab-btn" onclick="switchView('test')">풀이</button>
        <button id="tab-result" class="tab-btn" onclick="switchView('result')">결과</button>
    </footer>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <h3>관리자 환경 설정</h3>
        <div class="input-group">
            <span class="input-label">Gemini API Key</span>
            <input type="text" id="input-api-key" placeholder="AI Studio 키 입력">
        </div>
        <div class="input-group">
            <span class="input-label">GAS Web App URL (선택)</span>
            <input type="text" id="input-gas-url" placeholder="로깅용 시트 URL">
        </div>
        <div class="modal-actions">
            <button class="btn-outline" style="border-radius: 8px;" onclick="closeSettings()">취소</button>
            <button class="btn-primary" style="margin-top:0; border-radius: 8px;" onclick="saveSettings()">저장</button>
        </div>
        <div class="version-text">EnC Study Version 1.0.0</div>
    </div>
</div>

<script>
    // =========================================================================
    // 1. 상태 및 로컬 스토리지 관리 (Settings)
    // =========================================================================
    const APP_VERSION = "1.0.0";
    let base64ImageData = null;
    let imageMimeType = null;
    let cachedResult = null; // GAS 전송용 결과 캐시

    function getApiKey() { return localStorage.getItem('ENC_GEMINI_KEY') || ""; }
    function getGasUrl() { return localStorage.getItem('ENC_GAS_URL') || ""; }

    function openSettings() {
        document.getElementById('input-api-key').value = getApiKey();
        document.getElementById('input-gas-url').value = getGasUrl();
        document.getElementById('settings-modal').style.display = 'flex';
    }

    function closeSettings() {
        document.getElementById('settings-modal').style.display = 'none';
    }

    function saveSettings() {
        const key = document.getElementById('input-api-key').value.trim();
        const url = document.getElementById('input-gas-url').value.trim();
        if(key) localStorage.setItem('ENC_GEMINI_KEY', key);
        if(url) localStorage.setItem('ENC_GAS_URL', url);
        alert('설정이 안전하게 기기에 저장되었습니다.');
        closeSettings();
    }

    // =========================================================================
    // 2. UI 전환 및 유틸리티
    // =========================================================================
    function switchView(target) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + target).classList.add('active');
        document.getElementById('tab-' + target).classList.add('active');
        window.scrollTo(0, 0);
    }

    // [복구 완료] HTML5 Media Capture API를 이용한 실제 디바이스 카메라 연동
    function triggerCamera(step) { 
        const cameraInput = document.createElement("input");
        cameraInput.type = "file";
        cameraInput.accept = "image/*";
        cameraInput.capture = "environment"; // 하드웨어 후면 카메라(스캔용) 직접 호출
        
        cameraInput.onchange = function(event) {
            handleImageUpload(event);
        };
        
        cameraInput.click();
    }

    function resetAndGoInput() {
        base64ImageData = null; imageMimeType = null; cachedResult = null;
        document.getElementById('image-preview-container').style.display = 'none';
        document.getElementById('file-upload').value = "";
        document.getElementById('text-input').value = "";
        document.getElementById('btn-analyze').disabled = false;
        document.getElementById('btn-analyze').innerText = "▶ 지문 분석 시작";
        
        document.getElementById('btn-submit').style.display = 'none';
        document.getElementById('btn-retry-error').style.display = 'none';
        document.getElementById('loading-status').innerHTML = "대기 중...";
        
        switchView('input');
    }

    // =========================================================================
    // 3. 클라이언트 단 자동 이미지 압축 (Resizing) - 메모리 최적화
    // =========================================================================
    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        imageMimeType = "image/jpeg"; // 압축 후 표준화
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement("canvas");
                const MAX_WIDTH = 1024; // 스캔 최적화 사이즈
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height = Math.round((height * MAX_WIDTH) / width);
                    width = MAX_WIDTH;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);

                // 압축된 데이터를 Base64로 추출 (품질 0.7)
                const compressedDataUrl = canvas.toDataURL("image/jpeg", 0.7);
                base64ImageData = compressedDataUrl.split(',')[1];
                
                document.getElementById('image-preview').src = compressedDataUrl;
                document.getElementById('image-preview-container').style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // =========================================================================
    // 4. 핵심 연산기 (AI 통신 및 락 다운)
    // =========================================================================
    async function analyzeData() {
        const apiKey = getApiKey();
        if (!apiKey) {
            alert("관리자 설정(⚙️)에서 API Key를 먼저 입력하십시오.");
            return;
        }

        const inputText = document.getElementById('text-input').value.trim();
        if (!inputText && !base64ImageData) {
            alert("텍스트를 입력하거나 사진을 첨부하십시오.");
            return;
        }

        // 버튼 잠금 (Debounce)
        const analyzeBtn = document.getElementById('btn-analyze');
        analyzeBtn.disabled = true;
        analyzeBtn.innerText = "연산 중입니다...";

        // 뷰 전환
        switchView('test');
        const statusBox = document.getElementById('loading-status');
        const submitBtn = document.getElementById('btn-submit');
        const errorBtn = document.getElementById('btn-retry-error');
        
        submitBtn.style.display = 'none';
        errorBtn.style.display = 'none';
        statusBox.innerHTML = `EnC Study Kernel(v${APP_VERSION})이 [라우터 DB]를 기반으로<br>논리를 연산 중입니다...<br><br><span style="color: var(--text-sub); font-size: 0.85rem;">(소요 시간: 약 3~5초)</span>`;

        try {
            try {
    const systemInstruction = `You are 'EnC Study v1.0.0', a deterministic logic calculator for the Korean CSAT English exam.
All user inputs are English passages. Never engage in conversation. Never provide explanations. 
Output STRICTLY in valid JSON format without markdown code blocks.

[Router DB]
- [R1_Science]: Tokens (experiment, research, evidence, analysis, demonstrate). Strategy: Extract hints from conclusion sentences containing 'Thus' or 'In this way'.
- [R2_Rebuttal]: Tokens (However, But, Yet, critique, myth, traditional). Strategy: Extract hints from the sentence immediately following the reversal token.
- [R3_Fact]: Tokens (As a consequence, This means, process, sequence). Strategy: Extract hints from chronological conclusions.
- [R4_Imperative]: Tokens (should, must, encourage, imperative, important). Strategy: Extract hints from the last 1-3 sentences.
- [Skip]: Tokens (graphs, percentage, born, weather). Strategy: Output exactly {"error": "연산 제외 플래그 발동."}

[Output Format]
JSON only: {"main_idea": "...", "trigger_word": "...", "core_syntax": "...", "vocabulary": ["..."]}`;

    let promptParts = [{ text: "Analyze the logical structure of this text based on the [Router DB].\n" + (inputText ? `Input Text: ${inputText}` : "") }];
    if (base64ImageData) {
        promptParts.push({ inline_data: { mime_type: imageMimeType, data: base64ImageData } });
    }

    // [핵심 수정: 최신 v1beta 표준 규격]
    const requestBody = {
        contents: [{ parts: promptParts }],
        // system_instruction을 최상위로 이동
        system_instruction: { 
            parts: [{ text: systemInstruction }] 
        },
        generationConfig: {
            temperature: 0.1,
            responseMimeType: "application/json" // 뱀 표기법에서 카멜 표기법으로 수정
        }
    };

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestBody)
    });
    // ... 이하 동일}

[Operation Process]
1. Scan the input text/image and identify the matching Router from the [Router DB].
2. Apply the specific Strategy of that Router.
3. Output the result in the following JSON format ONLY. Values MUST be in Korean except for specific English words.

{
  "main_idea": "[Router: R1_Science] (한국어 1줄 핵심 요약)",
  "trigger_word": "(정답을 결정짓는 핵심 영단어/구와 한국어 뜻)",
  "core_syntax": "(타겟 좌표의 핵심 영어 문장과 한국어 해석)",
  "vocabulary": ["영단어1: 뜻", "영단어2: 뜻"]
}`;

            let promptParts = [{ text: "Analyze the logical structure of this text based on the [Router DB].\n" + (inputText ? `Input Text: ${inputText}` : "") }];
            if (base64ImageData) {
                promptParts.push({ inline_data: { mime_type: imageMimeType, data: base64ImageData } });
            }

            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: systemInstruction }] },
                    contents: [{ parts: promptParts }],
                    generationConfig: { temperature: 0.1, response_mime_type: "application/json" }
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const resultJson = JSON.parse(data.candidates[0].content.parts[0].text);
                
                if (resultJson.error) {
                    statusBox.innerHTML = `<div class="error-message">${resultJson.error}</div><span style='font-size: 0.9rem; color: var(--text-sub);'>기계적 연산 범위를 벗어난 지문입니다.</span>`;
                    errorBtn.style.display = 'block';
                    analyzeBtn.disabled = false; // 버튼 락 해제
                    analyzeBtn.innerText = "▶ 지문 분석 시작";
                    return;
                }

                // 결과 캐싱 및 렌더링
                cachedResult = resultJson;
                document.getElementById('res-main-idea').innerText = resultJson.main_idea || "정보 없음";
                document.getElementById('res-trigger-word').innerText = resultJson.trigger_word || "정보 없음";
                document.getElementById('res-core-syntax').innerText = resultJson.core_syntax || "정보 없음";
                
                const vocabList = document.getElementById('res-vocabulary');
                vocabList.innerHTML = '';
                if (Array.isArray(resultJson.vocabulary)) {
                    resultJson.vocabulary.forEach(word => { vocabList.innerHTML += `<li>- ${word}</li>`; });
                }

                statusBox.innerHTML = "문장 구조 및 논리 분석이 완벽히 종료되었습니다.<br><br><span style='color: var(--google-blue); font-weight:600;'>[정답 제출 및 채점] 버튼을 누르십시오.</span>";
                submitBtn.style.display = 'block';
            }
            
        } catch (error) {
            console.error(error);
            statusBox.innerHTML = `<div class="error-message">연산 오류 발생</div><span style='color: var(--text-main); font-size: 0.9rem;'>API Key가 올바른지 확인하십시오.</span><br><br><span style='font-size: 0.8rem; color: var(--text-sub);'>${error.message}</span>`;
            errorBtn.style.display = 'block';
            analyzeBtn.disabled = false;
            analyzeBtn.innerText = "▶ 지문 분석 시작";
        }
    }

    // =========================================================================
    // 5. 구글 시트(GAS) 로깅 통신부 (CORS 대응)
    // =========================================================================
    function submitAndSendLog() {
        const gasUrl = getGasUrl();
        // GAS URL이 설정되어 있고, 캐시된 결과가 있다면 백그라운드 전송 (no-cors)
        if (gasUrl && cachedResult) {
            fetch(gasUrl, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    timestamp: new Date().toISOString(),
                    main_idea: cachedResult.main_idea,
                    status: "Completed"
                })
            }).catch(e => console.log('GAS Logging silently failed:', e));
        }
        
        // 결과 화면으로 강제 전환 (GAS 통신 성공 여부와 무관하게 사용자 경험 보장)
        switchView('result');
    }
</script>
